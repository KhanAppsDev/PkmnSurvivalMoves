<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MoveForge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===== CSS VARIABLES ===== */
:root {
  --bg-0: #0b0e14;
  --bg-1: #111520;
  --bg-2: #181d2a;
  --bg-3: #1f2637;
  --bg-4: #282f44;
  --bg-5: #323a52;
  --text-primary: #e8ecf4;
  --text-secondary: #8b93a8;
  --text-muted: #5c6478;
  --accent-orange: #f0913a;
  --accent-orange-dim: rgba(240,145,58,0.15);
  --accent-blue: #4da6ff;
  --accent-blue-dim: rgba(77,166,255,0.12);
  --accent-purple: #b48eff;
  --accent-purple-dim: rgba(180,142,255,0.12);
  --accent-yellow: #f5c842;
  --accent-yellow-dim: rgba(245,200,66,0.12);
  --accent-teal: #3dd6c8;
  --accent-teal-dim: rgba(61,214,200,0.12);
  --accent-pink: #f06292;
  --accent-pink-dim: rgba(240,98,146,0.12);
  --accent-green: #66d9a0;
  --accent-green-dim: rgba(102,217,160,0.12);
  --accent-red: #ef5350;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-pill: 999px;
  --font-mono: 'DM Mono', monospace;
  --font-body: 'Nunito', sans-serif;
  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
font-family: var(–font-body);
background: var(–bg-0);
color: var(–text-primary);
min-height: 100dvh;
overflow-x: hidden;
overscroll-behavior: none;
-webkit-tap-highlight-color: transparent;
}
input, textarea, button { font-family: inherit; font-size: inherit; }
button { cursor: pointer; border: none; background: none; color: inherit; }
img { display: block; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(–bg-5); border-radius: 3px; }

/* ===== TOOLBAR ===== */
.toolbar {
position: sticky; top: 0; z-index: 100;
display: flex; align-items: center; justify-content: space-between;
padding: 10px 16px;
background: var(–bg-1);
border-bottom: 1px solid var(–bg-3);
}
.toolbar-brand {
display: flex; align-items: center; gap: 8px;
}
.toolbar-brand svg { width: 22px; height: 22px; flex-shrink: 0; }
.toolbar-brand-name {
font-family: var(–font-mono);
font-weight: 500; font-size: 15px;
color: var(–accent-orange);
letter-spacing: 0.5px;
}
.toolbar-version {
font-family: var(–font-mono);
font-size: 11px; color: var(–text-muted);
margin-left: 2px;
}
.menu-btn {
display: flex; align-items: center; gap: 6px;
padding: 8px 12px;
background: var(–bg-3);
border-radius: var(–radius-sm);
font-family: var(–font-mono);
font-size: 13px; color: var(–text-secondary);
min-height: 44px; min-width: 44px;
justify-content: center;
transition: background 0.15s;
}
.menu-btn:active { transform: scale(0.96); background: var(–bg-4); }
.menu-btn svg { width: 18px; height: 18px; }

/* ===== DROPDOWN MENU ===== */
.dropdown-menu {
display: none;
position: absolute; top: 100%; right: 16px;
background: var(–bg-3);
border: 1px solid var(–bg-5);
border-radius: var(–radius-md);
min-width: 200px;
box-shadow: 0 12px 32px rgba(0,0,0,0.5);
z-index: 110;
overflow: hidden;
padding: 4px;
}
.dropdown-menu.open { display: block; }
.dropdown-item {
display: flex; align-items: center; gap: 10px;
padding: 12px 14px;
font-size: 14px;
border-radius: var(–radius-sm);
width: 100%;
text-align: left;
transition: background 0.12s;
}
.dropdown-item:hover, .dropdown-item:active { background: var(–bg-4); }
.dropdown-item.danger { color: var(–accent-red); }
.dropdown-sep { height: 1px; background: var(–bg-5); margin: 4px 8px; }

/* ===== FILTER BAR ===== */
.filter-bar {
display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
padding: 10px 16px;
background: var(–bg-1);
border-bottom: 1px solid var(–bg-2);
}
.search-wrap {
position: relative; flex: 1; min-width: 140px;
}
.search-wrap svg {
position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
width: 16px; height: 16px; color: var(–text-muted); pointer-events: none;
}
.search-input {
width: 100%; padding: 10px 14px 10px 36px;
background: var(–bg-2); border: 1px solid var(–bg-4);
border-radius: var(–radius-pill);
color: var(–text-primary); font-size: 14px;
outline: none; transition: border-color 0.2s;
}
.search-input::placeholder { color: var(–text-muted); }
.search-input:focus { border-color: var(–accent-orange); }
.filter-chip {
display: flex; align-items: center; gap: 4px;
padding: 6px 10px 6px 12px;
border-radius: var(–radius-pill);
font-family: var(–font-mono);
font-size: 12px; font-weight: 500;
white-space: nowrap;
transition: opacity 0.15s;
}
.filter-chip:active { transform: scale(0.95); }
.filter-chip.habitat { background: var(–accent-teal-dim); color: var(–accent-teal); }
.filter-chip.personality { background: var(–accent-pink-dim); color: var(–accent-pink); }
.filter-chip .chip-x {
display: flex; align-items: center; justify-content: center;
width: 18px; height: 18px; border-radius: 50%;
background: rgba(255,255,255,0.1);
font-size: 12px; line-height: 1;
margin-left: 2px; cursor: pointer;
}

/* ===== STAT ROW ===== */
.stat-row {
display: flex; gap: 6px; padding: 8px 16px;
background: var(–bg-0);
}
.stat-item {
display: flex; align-items: center; gap: 5px;
font-family: var(–font-mono);
font-size: 12px; color: var(–text-muted);
}
.stat-val {
color: var(–accent-orange);
font-weight: 500;
}

/* ===== MON LIST ===== */
.mon-list-wrap {
flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
padding: 8px 12px;
padding-bottom: calc(80px + var(–safe-bottom));
}
.mon-list {
max-width: 600px; margin: 0 auto;
display: flex; flex-direction: column; gap: 6px;
}
.mon-card {
display: flex; align-items: center; gap: 12px;
padding: 10px 12px;
background: var(–bg-2);
border-radius: var(–radius-md);
border: 1px solid var(–bg-3);
cursor: pointer;
transition: background 0.12s, transform 0.1s;
}
.mon-card:active { transform: scale(0.985); background: var(–bg-3); }
.mon-sprite {
width: 44px; height: 44px; flex-shrink: 0;
image-rendering: pixelated;
border-radius: var(–radius-sm);
background: var(–bg-3);
}
.mon-info { flex: 1; min-width: 0; }
.mon-name {
font-weight: 700; font-size: 15px;
white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.mon-badges {
display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px;
}
.badge {
display: inline-flex; align-items: center;
padding: 2px 8px; border-radius: var(–radius-pill);
font-family: var(–font-mono); font-size: 11px; font-weight: 500;
cursor: pointer; transition: opacity 0.15s;
}
.badge:active { opacity: 0.7; transform: scale(0.95); }
.badge.habitat { background: var(–accent-teal-dim); color: var(–accent-teal); }
.badge.personality { background: var(–accent-pink-dim); color: var(–accent-pink); }
.badge.moves { background: var(–accent-blue-dim); color: var(–accent-blue); cursor: default; }
.mon-dex {
font-family: var(–font-mono); font-size: 13px;
color: var(–text-muted); flex-shrink: 0; margin-right: 4px;
}
.mon-chevron { flex-shrink: 0; color: var(–text-muted); width: 18px; height: 18px; }
.empty-state {
display: flex; flex-direction: column; align-items: center; justify-content: center;
text-align: center; padding: 60px 20px; gap: 16px;
}
.empty-state svg { width: 56px; height: 56px; color: var(–text-muted); opacity: 0.5; }
.empty-state p { color: var(–text-secondary); font-size: 15px; max-width: 280px; }
.empty-state button {
padding: 12px 24px;
background: var(–accent-orange);
color: var(–bg-0);
font-weight: 700; font-size: 15px;
border-radius: var(–radius-pill);
transition: transform 0.1s;
}
.empty-state button:active { transform: scale(0.96); }

/* ===== FAB ROW ===== */
.fab-row {
position: fixed; bottom: 0; left: 0; right: 0;
display: flex; justify-content: center;
padding: 12px 16px; padding-bottom: calc(12px + var(–safe-bottom));
background: linear-gradient(transparent, var(–bg-0) 40%);
pointer-events: none; z-index: 50;
}
.fab-row.hidden { display: none; }
.fab-btn {
padding: 12px 28px;
background: var(–bg-3);
border: 1px dashed var(–bg-5);
border-radius: var(–radius-pill);
color: var(–text-secondary);
font-family: var(–font-mono); font-size: 13px; font-weight: 500;
pointer-events: auto;
transition: background 0.12s, transform 0.1s;
}
.fab-btn:active { transform: scale(0.96); background: var(–bg-4); }

/* ===== MODAL OVERLAY ===== */
.modal-overlay {
position: fixed; inset: 0; z-index: 200;
background: rgba(0,0,0,0.6);
opacity: 0; pointer-events: none;
transition: opacity 0.25s var(–ease-out);
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }

/* ===== MODAL SHEET ===== */
.modal-sheet {
position: fixed; bottom: 0; left: 0; right: 0; z-index: 210;
background: var(–bg-1);
border-radius: var(–radius-lg) var(–radius-lg) 0 0;
max-height: 90dvh;
display: flex; flex-direction: column;
transform: translateY(100%);
transition: transform 0.35s var(–ease-out);
pointer-events: none;
}
.modal-sheet.open { transform: translateY(0); pointer-events: auto; }
.modal-sheet.wide { max-width: 560px; }
.modal-sheet:not(.wide) { max-width: 480px; }
.modal-handle {
display: flex; justify-content: center; padding: 10px 0 4px;
flex-shrink: 0;
}
.modal-handle-bar {
width: 36px; height: 4px;
background: var(–bg-5); border-radius: 2px;
}
.modal-header {
display: flex; align-items: center; justify-content: space-between;
padding: 6px 16px 12px;
flex-shrink: 0;
}
.modal-title {
font-weight: 800; font-size: 18px;
}
.modal-close-btn {
width: 36px; height: 36px;
display: flex; align-items: center; justify-content: center;
border-radius: 50%;
background: var(–bg-3);
transition: background 0.12s;
}
.modal-close-btn:active { transform: scale(0.92); background: var(–bg-4); }
.modal-close-btn svg { width: 18px; height: 18px; }
.modal-body {
flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
padding: 0 16px 16px;
}
.modal-footer {
display: flex; gap: 10px; padding: 12px 16px;
padding-bottom: calc(12px + var(–safe-bottom));
border-top: 1px solid var(–bg-3);
flex-shrink: 0;
}
.modal-footer .btn { flex: 1; }

/* ===== BUTTONS ===== */
.btn {
display: flex; align-items: center; justify-content: center;
padding: 12px 20px;
border-radius: var(–radius-md);
font-weight: 700; font-size: 15px;
min-height: 44px;
transition: transform 0.1s, background 0.12s;
}
.btn:active { transform: scale(0.96); }
.btn-primary { background: var(–accent-orange); color: var(–bg-0); }
.btn-secondary { background: var(–bg-3); color: var(–text-secondary); }
.btn-danger { background: rgba(239,83,80,0.15); color: var(–accent-red); }

/* ===== IMPORT MODAL ===== */
.import-hint {
font-size: 13px; color: var(–text-secondary); margin-bottom: 10px; line-height: 1.5;
}
.import-hint code {
font-family: var(–font-mono); font-size: 12px;
background: var(–bg-3); padding: 1px 5px; border-radius: 3px;
}
.import-textarea {
width: 100%; min-height: 180px;
padding: 12px; font-family: var(–font-mono); font-size: 13px;
background: var(–bg-2); border: 1px solid var(–bg-4);
border-radius: var(–radius-md);
color: var(–text-primary);
resize: vertical; outline: none;
transition: border-color 0.2s;
}
.import-textarea:focus { border-color: var(–accent-orange); }
.import-error {
margin-top: 8px; padding: 8px 12px;
background: rgba(239,83,80,0.1);
border-radius: var(–radius-sm);
font-size: 13px; color: var(–accent-red);
display: none;
}
.import-error.show { display: block; }

/* ===== DETAIL MODAL ===== */
.detail-header {
display: flex; align-items: center; gap: 14px;
padding-bottom: 14px; margin-bottom: 10px;
border-bottom: 1px solid var(–bg-3);
}
.detail-sprite {
width: 72px; height: 72px; flex-shrink: 0;
image-rendering: pixelated;
background: var(–bg-3); border-radius: var(–radius-md);
}
.detail-name { font-weight: 800; font-size: 22px; }
.detail-dex {
font-family: var(–font-mono); font-size: 13px;
color: var(–text-muted);
}
.detail-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }

/* ===== COLLAPSIBLE SECTIONS ===== */
.section-toggle {
display: flex; align-items: center; justify-content: space-between;
width: 100%; padding: 10px 0;
font-weight: 700; font-size: 14px;
text-transform: uppercase; letter-spacing: 0.5px;
color: var(–text-secondary);
}
.section-toggle:active { opacity: 0.8; }
.section-toggle svg {
width: 16px; height: 16px;
transition: transform 0.25s var(–ease-out);
}
.section-toggle.expanded svg { transform: rotate(90deg); }
.section-body {
display: none; padding-bottom: 10px;
}
.section-body.expanded { display: block; }
.section-count {
font-family: var(–font-mono); font-size: 12px;
color: var(–accent-blue); font-weight: 500;
margin-left: 6px;
}

/* ===== PROFILE FIELDS ===== */
.profile-field {
margin-bottom: 10px;
}
.profile-label {
font-family: var(–font-mono); font-size: 12px;
color: var(–text-muted); margin-bottom: 4px;
text-transform: uppercase; letter-spacing: 0.5px;
}
.profile-input {
width: 100%; padding: 10px 12px;
background: var(–bg-2); border: 1px solid var(–bg-4);
border-radius: var(–radius-sm);
color: var(–text-primary); font-size: 14px;
outline: none; transition: border-color 0.2s;
}
.profile-input:focus { border-color: var(–accent-orange); }

/* ===== MOVE CARDS ===== */
.move-card {
background: var(–bg-2); border: 1px solid var(–bg-3);
border-radius: var(–radius-md);
padding: 10px 12px; margin-bottom: 8px;
}
.move-card-top {
display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
}
.move-slot {
font-family: var(–font-mono); font-size: 11px;
color: var(–text-muted); width: 20px; text-align: center;
}
.move-tags { display: flex; flex-wrap: wrap; gap: 4px; flex: 1; min-width: 0; }
.move-tag {
display: inline-flex; padding: 2px 7px;
border-radius: var(–radius-pill);
font-family: var(–font-mono); font-size: 11px; font-weight: 500;
}
.move-tag.action { background: var(–accent-blue-dim); color: var(–accent-blue); }
.move-tag.modifier { background: var(–accent-yellow-dim); color: var(–accent-yellow); }
.move-tag.param { background: var(–accent-purple-dim); color: var(–accent-purple); }
.notes-btn {
width: 36px; height: 36px; flex-shrink: 0;
display: flex; align-items: center; justify-content: center;
border-radius: var(–radius-sm);
background: var(–bg-3);
transition: background 0.12s;
}
.notes-btn:active { transform: scale(0.92); }
.notes-btn.has-notes { background: var(–accent-orange-dim); color: var(–accent-orange); }
.notes-btn svg { width: 16px; height: 16px; }
.move-input-wrap { position: relative; }
.move-input {
width: 100%; padding: 8px 10px;
background: var(–bg-3); border: 1px solid var(–bg-4);
border-radius: var(–radius-sm);
color: var(–text-primary); font-family: var(–font-mono); font-size: 13px;
outline: none; transition: border-color 0.2s;
}
.move-input:focus { border-color: var(–accent-blue); }

/* ===== AUTOCOMPLETE ===== */
.ac-dropdown {
position: absolute; left: 0; right: 0; top: 100%;
background: var(–bg-3); border: 1px solid var(–bg-5);
border-radius: 0 0 var(–radius-sm) var(–radius-sm);
max-height: 200px; overflow-y: auto;
z-index: 50; display: none;
}
.ac-dropdown.open { display: block; }
.ac-item {
display: flex; align-items: center; gap: 8px;
padding: 8px 10px;
font-family: var(–font-mono); font-size: 13px;
cursor: pointer; transition: background 0.1s;
}
.ac-item:hover, .ac-item.highlight { background: var(–bg-4); }
.ac-badge {
padding: 1px 6px; border-radius: var(–radius-pill);
font-size: 10px; font-weight: 600;
flex-shrink: 0;
}
.ac-badge.move { background: var(–accent-green-dim); color: var(–accent-green); }
.ac-badge.act { background: var(–accent-blue-dim); color: var(–accent-blue); }
.ac-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ===== ADD MOVE BTN ===== */
.add-move-btn {
width: 100%; padding: 10px;
border: 1px dashed var(–bg-5);
border-radius: var(–radius-md);
font-family: var(–font-mono); font-size: 13px;
color: var(–text-muted);
transition: background 0.12s, border-color 0.12s;
}
.add-move-btn:hover { border-color: var(–accent-blue); color: var(–accent-blue); }
.add-move-btn:active { transform: scale(0.98); }

/* ===== NOTES MODAL ===== */
.notes-action-name {
font-family: var(–font-mono); font-size: 16px;
color: var(–accent-blue); font-weight: 500;
}
.notes-usage-count {
font-size: 13px; color: var(–text-muted); margin: 6px 0 14px;
}
.notes-usage-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
gap: 8px; margin-bottom: 16px;
}
.notes-usage-card {
display: flex; flex-direction: column; align-items: center;
gap: 4px; padding: 10px 6px;
background: var(–bg-2); border: 1px solid var(–bg-3);
border-radius: var(–radius-md);
cursor: pointer; text-align: center;
transition: background 0.12s, transform 0.1s;
}
.notes-usage-card:active { transform: scale(0.96); background: var(–bg-3); }
.notes-usage-sprite {
width: 40px; height: 40px;
image-rendering: pixelated;
}
.notes-usage-name {
font-weight: 700; font-size: 12px;
white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
max-width: 100%;
}
.notes-usage-move {
font-family: var(–font-mono); font-size: 10px;
color: var(–text-muted);
white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
max-width: 100%;
}
.notes-label {
font-family: var(–font-mono); font-size: 12px;
color: var(–text-muted); text-transform: uppercase;
letter-spacing: 0.5px; margin-bottom: 6px;
}
.notes-textarea {
width: 100%; min-height: 120px;
padding: 12px; font-family: var(–font-body); font-size: 14px;
background: var(–bg-2); border: 1px solid var(–bg-4);
border-radius: var(–radius-md);
color: var(–text-primary);
resize: vertical; outline: none;
transition: border-color 0.2s;
}
.notes-textarea:focus { border-color: var(–accent-orange); }
.notes-saved {
font-family: var(–font-mono); font-size: 12px;
color: var(–accent-green); margin-top: 6px;
opacity: 0; transition: opacity 0.3s;
}
.notes-saved.show { opacity: 1; }

/* ===== RESPONSIVE ===== */
@media (min-width: 641px) {
.modal-sheet { left: 50%; right: auto; transform: translate(-50%, 100%); width: 480px; }
.modal-sheet.wide { width: 560px; }
.modal-sheet.open { transform: translate(-50%, 0); }
.filter-bar { justify-content: center; }
.search-wrap { max-width: 400px; }
.stat-row { justify-content: center; }
.mon-list-wrap { padding: 12px 20px; padding-bottom: calc(80px + var(–safe-bottom)); }
}
</style>

</head>
<body>

<!-- TOOLBAR -->

<div class="toolbar">
  <div class="toolbar-brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent-orange)">
      <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
    </svg>
    <span class="toolbar-brand-name">MoveForge</span>
    <span class="toolbar-version" id="versionLabel">v1.0.0</span>
  </div>
  <div style="position:relative">
    <button class="menu-btn" id="menuBtn" aria-label="Menu">
      <span>Menu</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="dropdown-menu" id="dropdownMenu">
      <button class="dropdown-item" id="menuImport">

<script>
/* ===================================================================
   MoveForge v1.0.0
   Single-file HTML/CSS/JS app for Pokémon-like move system design
   =================================================================== */

var VERSION = 'v1.0.0';

/* ===== XSS HELPER ===== */
function esc(str) {
  if (str === null || str === undefined) return '';
  var d = document.createElement('div');
  d.textContent = String(str);
  return d.innerHTML;
}

/* ===== SPRITE URL ===== */
function spriteUrl(id) {
  return 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/' + id + '.png';
}
function spriteFallback() {
  return 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44"><rect width="44" height="44" fill="%23282f44" rx="6"/><text x="22" y="28" text-anchor="middle" font-size="20" fill="%235c6478">?</text></svg>');
}

/* ===== STORE MODULE ===== */
var Store = (function() {
  var KEYS = {
    pokemon: 'mf_pokemon',
    edits: 'mf_edits',
    notes: 'mf_notes',
    meta: 'mf_meta'
  };
  function _get(key, fallback) {
    try {
      var raw = localStorage.getItem(key);
      if (raw === null) return fallback;
      return JSON.parse(raw);
    } catch(e) { return fallback; }
  }
  function _set(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) { console.error('Store save error:', e); }
  }
  return {
    loadPokemon: function() { return _get(KEYS.pokemon, []); },
    savePokemon: function(arr) { _set(KEYS.pokemon, arr); },
    loadEdits: function() { return _get(KEYS.edits, {}); },
    saveEdits: function(obj) { _set(KEYS.edits, obj); },
    loadNotes: function() { return _get(KEYS.notes, {}); },
    saveNotes: function(obj) { _set(KEYS.notes, obj); },
    loadMeta: function() { return _get(KEYS.meta, {}); },
    saveMeta: function(obj) { _set(KEYS.meta, obj); },
    clearAll: function() {
      try {
        localStorage.removeItem(KEYS.pokemon);
        localStorage.removeItem(KEYS.edits);
        localStorage.removeItem(KEYS.notes);
        localStorage.removeItem(KEYS.meta);
      } catch(e) {}
    }
  };
})();

/* ===== APP STATE ===== */
var AppState = {
  pokemon: [],
  moveEdits: {},
  actionNotes: {},
  metaEdits: {},
  filters: { search: '', habitat: null, personality: null }
};

function loadState() {
  AppState.pokemon = Store.loadPokemon();
  AppState.moveEdits = Store.loadEdits();
  AppState.actionNotes = Store.loadNotes();
  AppState.metaEdits = Store.loadMeta();
}

/* ===== MOVE PARSER ===== */
var Parser = (function() {
  var MOD_PATTERNS = [
    /^(light|medium|heavy|ultra)$/i,
    /^x\d+$/i,
    /^(fast|slow|charged|split)$/i,
    /^(aoe|self|ally|random)$/i
  ];
  function isMod(token) {
    for (var i = 0; i < MOD_PATTERNS.length; i++) {
      if (MOD_PATTERNS[i].test(token)) return true;
    }
    return false;
  }
  return {
    parse: function(str) {
      if (!str || typeof str !== 'string') return { action: '', param: null, modifiers: [], raw: str || '' };
      str = str.trim();
      var param = null;
      var prefix = str;
      var parenMatch = str.match(/^(.*)\(([^)]*)\)\s*$/);
      if (parenMatch) {
        prefix = parenMatch[1].trim();
        param = parenMatch[2];
      }
      var tokens = prefix.split(/\s+/).filter(function(t) { return t.length > 0; });
      var actionParts = [];
      var modifiers = [];
      var hitMod = false;
      for (var i = 0; i < tokens.length; i++) {
        if (!hitMod && !isMod(tokens[i])) {
          actionParts.push(tokens[i]);
        } else {
          hitMod = true;
          if (isMod(tokens[i])) {
            modifiers.push(tokens[i]);
          } else {
            modifiers.push(tokens[i]);
          }
        }
      }
      var action = actionParts.join(' ');
      return { action: action, param: param, modifiers: modifiers, raw: str };
    }
  };
})();

/* ===== HELPERS ===== */
function getMoves(monName) {
  var base = null;
  for (var i = 0; i < AppState.pokemon.length; i++) {
    if (AppState.pokemon[i].name === monName) { base = AppState.pokemon[i]; break; }
  }
  if (!base) return [];
  var edits = AppState.moveEdits[monName];
  return edits ? edits.slice() : base.moves.slice();
}

function getHabitat(mon) {
  var me = AppState.metaEdits[mon.name];
  if (me && me.habitat !== undefined) return me.habitat;
  return mon.habitat || '';
}

function getPersonality(mon) {
  var me = AppState.metaEdits[mon.name];
  if (me && me.personality !== undefined) return me.personality;
  return mon.personality || '';
}

function getAllHabitats() {
  var set = {};
  for (var i = 0; i < AppState.pokemon.length; i++) {
    var h = getHabitat(AppState.pokemon[i]);
    if (h) set[h] = true;
  }
  return Object.keys(set).sort();
}

function getAllPersonalities() {
  var set = {};
  for (var i = 0; i < AppState.pokemon.length; i++) {
    var p = getPersonality(AppState.pokemon[i]);
    if (p) set[p] = true;
  }
  return Object.keys(set).sort();
}

function getAllActions() {
  var set = {};
  for (var i = 0; i < AppState.pokemon.length; i++) {
    var moves = getMoves(AppState.pokemon[i].name);
    for (var j = 0; j < moves.length; j++) {
      var parsed = Parser.parse(moves[j]);
      if (parsed.action) set[parsed.action.toLowerCase()] = parsed.action;
    }
  }
  return set;
}

function countUniqueActions() {
  return Object.keys(getAllActions()).length;
}

function countNotes() {
  var c = 0;
  var keys = Object.keys(AppState.actionNotes);
  for (var i = 0; i < keys.length; i++) {
    if (AppState.actionNotes[keys[i]] && AppState.actionNotes[keys[i]].trim().length > 0) c++;
  }
  return c;
}

function getFilteredPokemon() {
  var result = [];
  var s = AppState.filters.search.toLowerCase();
  var hf = AppState.filters.habitat;
  var pf = AppState.filters.personality;
  for (var i = 0; i < AppState.pokemon.length; i++) {
    var mon = AppState.pokemon[i];
    if (hf && getHabitat(mon) !== hf) continue;
    if (pf && getPersonality(mon) !== pf) continue;
    if (s) {
      var nameMatch = mon.name.toLowerCase().indexOf(s) >= 0;
      var moveMatch = false;
      var moves = getMoves(mon.name);
      for (var j = 0; j < moves.length; j++) {
        if (moves[j].toLowerCase().indexOf(s) >= 0) { moveMatch = true; break; }
      }
      if (!nameMatch && !moveMatch) continue;
    }
    result.push(mon);
  }
  return result;
}

/* ===== AUTOCOMPLETE ENGINE ===== */
var Autocomplete = (function() {
  function gather() {
    var moveSet = {};
    var actSet = {};
    for (var i = 0; i < AppState.pokemon.length; i++) {
      var moves = getMoves(AppState.pokemon[i].name);
      for (var j = 0; j < moves.length; j++) {
        var mv = moves[j];
        if (mv && mv.trim()) moveSet[mv] = true;
        var parsed = Parser.parse(mv);
        if (parsed.action) actSet[parsed.action.toLowerCase()] = parsed.action;
      }
    }
    return { moves: Object.keys(moveSet), actions: actSet };
  }
  return {
    suggest: function(query) {
      if (!query || query.length < 1) return [];
      var q = query.toLowerCase();
      var data = gather();
      var results = [];
      for (var i = 0; i < data.moves.length; i++) {
        if (data.moves[i].toLowerCase().indexOf(q) >= 0) {
          results.push({ text: data.moves[i], type: 'move' });
        }
      }
      var actKeys = Object.keys(data.actions);
      for (var i = 0; i < actKeys.length; i++) {
        var actName = data.actions[actKeys[i]];
        if (actKeys[i].indexOf(q) === 0) {
          var already = false;
          for (var j = 0; j < results.length; j++) {
            if (results[j].text === actName && results[j].type === 'act') { already = true; break; }
          }
          if (!already) results.push({ text: actName, type: 'act' });
        }
      }
      results.sort(function(a, b) {
        if (a.type === 'move' && b.type !== 'move') return -1;
        if (a.type !== 'move' && b.type === 'move') return 1;
        return a.text.localeCompare(b.text);
      });
      return results.slice(0, 10);
    }
  };
})();

/* ===== UI RENDERING ===== */
function renderList() {
  var listEl = document.getElementById('monList');
  var filtered = getFilteredPokemon();

  if (AppState.pokemon.length === 0) {
    listEl.innerHTML =
      '<div class="empty-state">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>' +
        '<p>No Pok\u00e9mon loaded yet. Import a JSON array to start forging moves.</p>' +
        '<button id="emptyImportBtn">Import JSON</button>' +
      '</div>';
    document.getElementById('fabRow').classList.add('hidden');
    var eib = document.getElementById('emptyImportBtn');
    if (eib) eib.addEventListener('click', openImportModal);
    return;
  }

  document.getElementById('fabRow').classList.remove('hidden');

  if (filtered.length === 0) {
    listEl.innerHTML =
      '<div class="empty-state">' +
        '<p>No results match your filters.</p>' +
      '</div>';
    return;
  }

  var html = '';
  for (var i = 0; i < filtered.length; i++) {
    var mon = filtered[i];
    var hab = getHabitat(mon);
    var pers = getPersonality(mon);
    var moves = getMoves(mon.name);
    html += '<div class="mon-card" data-name="' + esc(mon.name) + '">' +
      '<img class="mon-sprite" src="' + spriteUrl(mon.id) + '" alt="' + esc(mon.name) + '" onerror="this.src=spriteFallback()">' +
      '<div class="mon-info">' +
        '<div class="mon-name">' + esc(mon.name) + '</div>' +
        '<div class="mon-badges">';
    if (hab) {
      html += '<span class="badge habitat" data-habitat="' + esc(hab) + '">' + esc(hab) + '</span>';
    }
    if (pers) {
      html += '<span class="badge personality" data-personality="' + esc(pers) + '">' + esc(pers) + '</span>';
    }
    html += '<span class="badge moves">' + moves.length + ' moves</span>';
    html += '</div></div>' +
      '<span class="mon-dex">#' + esc(String(mon.id)) + '</span>' +
      '<svg class="mon-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>' +
    '</div>';
  }
  listEl.innerHTML = html;
}

function renderStats() {
  document.getElementById('statMons').textContent = AppState.pokemon.length;
  document.getElementById('statActions').textContent = countUniqueActions();
  document.getElementById('statNotes').textContent = countNotes();
}

function renderFilterChips() {
  var container = document.getElementById('filterChips');
  var html = '';
  if (AppState.filters.habitat) {
    html += '<div class="filter-chip habitat">' + esc(AppState.filters.habitat) +
      '<span class="chip-x" data-clear="habitat">\u2715</span></div>';
  }
  if (AppState.filters.personality) {
    html += '<div class="filter-chip personality">' + esc(AppState.filters.personality) +
      '<span class="chip-x" data-clear="personality">\u2715</span></div>';
  }
  container.innerHTML = html;
}

function renderAll() {
  renderList();
  renderStats();
  renderFilterChips();
}

/* ===== MOVE TAG RENDERING ===== */
function renderMoveTags(moveStr) {
  var parsed = Parser.parse(moveStr);
  var html = '';
  if (parsed.action) {
    html += '<span class="move-tag action">' + esc(parsed.action) + '</span>';
  }
  for (var i = 0; i < parsed.modifiers.length; i++) {
    html += '<span class="move-tag modifier">' + esc(parsed.modifiers[i]) + '</span>';
  }
  if (parsed.param !== null) {
    html += '<span class="move-tag param">' + esc(parsed.param) + '</span>';
  }
  return html;
}

/* ===== MODAL HELPERS ===== */
function openModal(overlayId, sheetId) {
  document.getElementById(overlayId).classList.add('open');
  document.getElementById(sheetId).classList.add('open');
}
function closeModal(overlayId, sheetId) {
  document.getElementById(overlayId).classList.remove('open');
  document.getElementById(sheetId).classList.remove('open');
}

/* ===== IMPORT MODAL ===== */
function openImportModal() {
  closeDropdown();
  document.getElementById('importTextarea').value = '';
  document.getElementById('importError').classList.remove('show');
  document.getElementById('importError').textContent = '';
  openModal('importOverlay', 'importSheet');
}
function closeImportModal() {
  closeModal('importOverlay', 'importSheet');
}
function doImport() {
  var raw = document.getElementById('importTextarea').value.trim();
  var errEl = document.getElementById('importError');
  if (!raw) {
    errEl.textContent = 'Please paste JSON data.';
    errEl.classList.add('show');
    return;
  }
  var data;
  try { data = JSON.parse(raw); } catch(e) {
    errEl.textContent = 'Invalid JSON: ' + e.message;
    errEl.classList.add('show');
    return;
  }
  if (!Array.isArray(data)) {
    errEl.textContent = 'JSON must be an array.';
    errEl.classList.add('show');
    return;
  }
  var valid = [];
  for (var i = 0; i < data.length; i++) {
    var entry = data[i];
    if (!entry || typeof entry.name !== 'string' || !entry.name.trim()) {
      errEl.textContent = 'Entry ' + i + ': missing or invalid "name" (string required).';
      errEl.classList.add('show');
      return;
    }
    if (typeof entry.id !== 'number') {
      errEl.textContent = 'Entry ' + i + ' (' + entry.name + '): missing or invalid "id" (number required).';
      errEl.classList.add('show');
      return;
    }
    if (!Array.isArray(entry.moves)) {
      errEl.textContent = 'Entry ' + i + ' (' + entry.name + '): missing or invalid "moves" (array required).';
      errEl.classList.add('show');
      return;
    }
    var cleanMoves = [];
    for (var j = 0; j < entry.moves.length && j < 6; j++) {
      if (typeof entry.moves[j] === 'string') cleanMoves.push(entry.moves[j]);
    }
    var obj = { name: entry.name.trim(), id: entry.id, moves: cleanMoves };
    if (typeof entry.habitat === 'string' && entry.habitat.trim()) obj.habitat = entry.habitat.trim();
    else obj.habitat = '';
    if (typeof entry.personality === 'string' && entry.personality.trim()) obj.personality = entry.personality.trim();
    else obj.personality = '';
    valid.push(obj);
  }
  // Merge by name
  var nameMap = {};
  for (var i = 0; i < AppState.pokemon.length; i++) {
    nameMap[AppState.pokemon[i].name] = i;
  }
  for (var i = 0; i < valid.length; i++) {
    if (nameMap.hasOwnProperty(valid[i].name)) {
      AppState.pokemon[nameMap[valid[i].name]] = valid[i];
    } else {
      AppState.pokemon.push(valid[i]);
    }
  }
  AppState.pokemon.sort(function(a, b) { return a.id - b.id; });
  Store.savePokemon(AppState.pokemon);
  closeImportModal();
  renderAll();
}

/* ===== DETAIL MODAL ===== */
var currentDetailMon = null;

function openDetailModal(monName) {
  var mon = null;
  for (var i = 0; i < AppState.pokemon.length; i++) {
    if (AppState.pokemon[i].name === monName) { mon = AppState.pokemon[i]; break; }
  }
  if (!mon) return;
  currentDetailMon = mon;
  renderDetailBody(mon);
  openModal('detailOverlay', 'detailSheet');
}

function closeDetailModal() {
  closeModal('detailOverlay', 'detailSheet');
  currentDetailMon = null;
  // Close any open autocompletes
  var acs = document.querySelectorAll('.ac-dropdown');
  for (var i = 0; i < acs.length; i++) acs[i].classList.remove('open');
  renderAll();
}

function renderDetailBody(mon) {
  var body = document.getElementById('detailBody');
  var hab = getHabitat(mon);
  var pers = getPersonality(mon);
  var moves = getMoves(mon.name);
  var allHabitats = getAllHabitats();
  var allPersonalities = getAllPersonalities();

  var html = '';
  // Header
  html += '<div class="detail-header">' +
    '<img class="detail-sprite" src="' + spriteUrl(mon.id) + '" alt="' + esc(mon.name) + '" onerror="this.src=spriteFallback()">' +
    '<div>' +
      '<div class="detail-name">' + esc(mon.name) + '</div>' +
      '<div class="detail-dex">#' + esc(String(mon.id)) + '</div>' +
      '<div class="detail-badges">';
  if (hab) html += '<span class="badge habitat">' + esc(hab) + '</span>';
  if (pers) html += '<span class="badge personality">' + esc(pers) + '</span>';
  html += '</div></div></div>';

  // Profile section (collapsed by default)
  html += '<button class="section-toggle" id="profileToggle">' +
    '<span>Profile</span>' +
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>' +
  '</button>' +
  '<div class="section-body" id="profileBody">';

  // Habitat datalist
  html += '<datalist id="habitatList">';
  for (var i = 0; i < allHabitats.length; i++) {
    html += '<option value="' + esc(allHabitats[i]) + '">';
  }
  html += '</datalist>';
  // Personality datalist
  html += '<datalist id="personalityList">';
  for (var i = 0; i < allPersonalities.length; i++) {
    html += '<option value="' + esc(allPersonalities[i]) + '">';
  }
  html += '</datalist>';

  html += '<div class="profile-field">' +
    '<div class="profile-label">Habitat</div>' +
    '<input class="profile-input" id="profileHabitat" type="text" list="habitatList" value="' + esc(hab) + '" placeholder="e.g. Meadow, Cave, Ocean">' +
  '</div>' +
  '<div class="profile-field">' +
    '<div class="profile-label">Personality</div>' +
    '<input class="profile-input" id="profilePersonality" type="text" list="personalityList" value="' + esc(pers) + '" placeholder="e.g. Bold, Timid, Jolly">' +
  '</div>' +
  '</div>';

  // Moves section (expanded by default)
  html += '<button class="section-toggle expanded" id="movesToggle">' +
    '<span>Moves <span class="section-count">' + moves.length + '/6</span></span>' +
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>' +
  '</button>' +
  '<div class="section-body expanded" id="movesBody">';

  for (var i = 0; i < moves.length; i++) {
    var parsed = Parser.parse(moves[i]);
    var actionKey = parsed.action ? parsed.action.toLowerCase() : '';
    var hasNotes = actionKey && AppState.actionNotes[actionKey] && AppState.actionNotes[actionKey].trim().length > 0;
    html += '<div class="move-card" data-slot="' + i + '">' +
      '<div class="move-card-top">' +
        '<span class="move-slot">' + (i + 1) + '</span>' +
        '<div class="move-tags" id="moveTags' + i + '">' + renderMoveTags(moves[i]) + '</div>' +
        '<button class="notes-btn' + (hasNotes ? ' has-notes' : '') + '" data-action="' + esc(actionKey) + '" data-slot="' + i + '" title="Action notes">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>' +
        '</button>' +
      '</div>' +
      '<div class="move-input-wrap">' +
        '<input class="move-input" data-slot="' + i + '" type="text" value="' + esc(moves[i]) + '" placeholder="e.g. Shoot(Spark)">' +
        '<div class="ac-dropdown" id="ac' + i + '"></div>' +
      '</div>' +
    '</div>';
  }

  if (moves.length < 6) {
    html += '<button class="add-move-btn" id="addMoveBtn">+ Add move slot</button>';
  }

  html += '</div>';

  body.innerHTML = html;

  // Wire events after rendering
  wireDetailEvents(mon);
}

function wireDetailEvents(mon) {
  // Profile toggle
  var pt = document.getElementById('profileToggle');
  var pb = document.getElementById('profileBody');
  if (pt) {
    pt.addEventListener('click', function() {
      pt.classList.toggle('expanded');
      pb.classList.toggle('expanded');
    });
  }

  // Moves toggle
  var mt = document.getElementById('movesToggle');
  var mb = document.getElementById('movesBody');
  if (mt) {
    mt.addEventListener('click', function() {
      mt.classList.toggle('expanded');
      mb.classList.toggle('expanded');
    });
  }

  // Profile inputs
  var phInput = document.getElementById('profileHabitat');
  var ppInput = document.getElementById('profilePersonality');
  if (phInput) {
    phInput.addEventListener('input', function() {
      if (!AppState.metaEdits[mon.name]) AppState.metaEdits[mon.name] = {};
      AppState.metaEdits[mon.name].habitat = phInput.value.trim();
      Store.saveMeta(AppState.metaEdits);
    });
  }
  if (ppInput) {
    ppInput.addEventListener('input', function() {
      if (!AppState.metaEdits[mon.name]) AppState.metaEdits[mon.name] = {};
      AppState.metaEdits[mon.name].personality = ppInput.value.trim();
      Store.saveMeta(AppState.metaEdits);
    });
  }

  // Move inputs + autocomplete
  var moveInputs = document.querySelectorAll('.move-input');
  for (var i = 0; i < moveInputs.length; i++) {
    (function(input) {
      var slot = parseInt(input.getAttribute('data-slot'), 10);
      var acEl = document.getElementById('ac' + slot);
      var acIdx = -1;

      input.addEventListener('input', function() {
        var val = input.value;
        // Update tags live
        var tagsEl = document.getElementById('moveTags' + slot);
        if (tagsEl) tagsEl.innerHTML = renderMoveTags(val);
        // Save edit
        saveMoveEdit(mon.name, slot, val);
        // Show autocomplete
        showAc(val);
      });

      input.addEventListener('focus', function() {
        if (input.value.length > 0) showAc(input.value);
      });

      input.addEventListener('blur', function() {
        // Delay to allow click on ac item
        setTimeout(function() { if (acEl) acEl.classList.remove('open'); }, 150);
      });

      input.addEventListener('keydown', function(e) {
        if (!acEl || !acEl.classList.contains('open')) {
          if (e.key === 'Escape') {
            input.blur();
            e.preventDefault();
          }
          return;
        }
        var items = acEl.querySelectorAll('.ac-item');
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          acIdx = Math.min(acIdx + 1, items.length - 1);
          updateAcHighlight(items, acIdx);
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          acIdx = Math.max(acIdx - 1, 0);
          updateAcHighlight(items, acIdx);
        } else if (e.key === 'Enter') {
          e.preventDefault();
          if (acIdx >= 0 && acIdx < items.length) {
            selectAcItem(items[acIdx]);
          }
          acEl.classList.remove('open');
        } else if (e.key === 'Escape') {
          e.preventDefault();
          acEl.classList.remove('open');
        }
      });

      function showAc(query) {
        if (!acEl) return;
        var suggestions = Autocomplete.suggest(query);
        if (suggestions.length === 0) { acEl.classList.remove('open'); return; }
        acIdx = -1;
        var h = '';
        for (var j = 0; j < suggestions.length; j++) {
          var s = suggestions[j];
          h += '<div class="ac-item" data-value="' + esc(s.text) + '" data-type="' + s.type + '">' +
            '<span class="ac-badge ' + s.type + '">' + (s.type === 'move' ? 'MOVE' : 'ACT') + '</span>' +
            '<span class="ac-text">' + esc(s.text) + '</span>' +
          '</div>';
        }
        acEl.innerHTML = h;
        acEl.classList.add('open');
        // Wire click
        var acItems = acEl.querySelectorAll('.ac-item');
        for (var j = 0; j < acItems.length; j++) {
          acItems[j].addEventListener('mousedown', function(ev) {
            ev.preventDefault();
            selectAcItem(this);
            acEl.classList.remove('open');
          });
        }
      }

      function selectAcItem(itemEl) {
        var val = itemEl.getAttribute('data-value');
        input.value = val;
        var tagsEl = document.getElementById('moveTags' + slot);
        if (tagsEl) tagsEl.innerHTML = renderMoveTags(val);
        saveMoveEdit(mon.name, slot, val);
      }

      function updateAcHighlight(items, idx) {
        for (var j = 0; j < items.length; j++) {
          items[j].classList.toggle('highlight', j === idx);
        }
      }
    })(moveInputs[i]);
  }

  // Notes buttons
  var notesBtns = document.querySelectorAll('.notes-btn');
  for (var i = 0; i < notesBtns.length; i++) {
    notesBtns[i].addEventListener('click', function() {
      var actionKey = this.getAttribute('data-action');
      if (actionKey) openNotesModal(actionKey);
    });
  }

  // Add move button
  var addBtn = document.getElementById('addMoveBtn');
  if (addBtn) {
    addBtn.addEventListener('click', function() {
      var moves = getMoves(mon.name);
      if (moves.length >= 6) return;
      moves.push('');
      AppState.moveEdits[mon.name] = moves;
      Store.saveEdits(AppState.moveEdits);
      renderDetailBody(mon);
    });
  }
}

function saveMoveEdit(monName, slot, value) {
  var moves = getMoves(monName);
  while (moves.length <= slot) moves.push('');
  moves[slot] = value;
  AppState.moveEdits[monName] = moves;
  Store.saveEdits(AppState.moveEdits);
}

/* ===== NOTES MODAL ===== */
var currentNotesAction = null;
var notesSaveTimer = null;

function openNotesModal(actionKey) {
  currentNotesAction = actionKey;
  renderNotesBody(actionKey);
  openModal('notesOverlay', 'notesSheet');
}

function closeNotesModal() {
  closeModal('notesOverlay', 'notesSheet');
  currentNotesAction = null;
  if (notesSaveTimer) { clearTimeout(notesSaveTimer); notesSaveTimer = null; }
  // Refresh detail if open
  if (currentDetailMon) renderDetailBody(currentDetailMon);
}

function renderNotesBody(actionKey) {
  var body = document.getElementById('notesBody');
  // Find all mons using this action
  var allActions = getAllActions();
  var displayName = allActions[actionKey] || actionKey;
  var users = [];
  for (var i = 0; i < AppState.pokemon.length; i++) {
    var mon = AppState.pokemon[i];
    var moves = getMoves(mon.name);
    for (var j = 0; j < moves.length; j++) {
      var parsed = Parser.parse(moves[j]);
      if (parsed.action && parsed.action.toLowerCase() === actionKey) {
        users.push({ mon: mon, move: moves[j] });
      }
    }
  }

  var noteText = AppState.actionNotes[actionKey] || '';
  var html = '';
  html += '<div class="notes-action-name">' + esc(displayName) + '</div>';
  html += '<div class="notes-usage-count">' + users.length + ' Pok\u00e9mon use this action</div>';

  if (users.length > 0) {
    html += '<div class="notes-usage-grid">';
    for (var i = 0; i < users.length; i++) {
      var u = users[i];
      html += '<div class="notes-usage-card" data-name="' + esc(u.mon.name) + '">' +
        '<img class="notes-usage-sprite" src="' + spriteUrl(u.mon.id) + '" alt="' + esc(u.mon.name) + '" onerror="this.src=spriteFallback()">' +
        '<div class="notes-usage-name">' + esc(u.mon.name) + '</div>' +
        '<div class="notes-usage-move">' + esc(u.move) + '</div>' +
      '</div>';
    }
    html += '</div>';
  }

  html += '<div class="notes-label">Design Notes</div>';
  html += '<textarea class="notes-textarea" id="notesTextarea" placeholder="Write design notes for this action...">' + esc(noteText) + '</textarea>';

html += ‘<div class="notes-saved" id="notesSaved">\u2713 saved</div>’;

body.innerHTML = html;

// Wire usage card clicks
var usageCards = body.querySelectorAll(’.notes-usage-card’);
for (var i = 0; i < usageCards.length; i++) {
usageCards[i].addEventListener(‘click’, function() {
var name = this.getAttribute(‘data-name’);
closeNotesModal();
closeDetailModal();
setTimeout(function() { openDetailModal(name); }, 100);
});
}

// Wire textarea autosave
var ta = document.getElementById(‘notesTextarea’);
var savedEl = document.getElementById(‘notesSaved’);
if (ta) {
ta.addEventListener(‘input’, function() {
if (notesSaveTimer) clearTimeout(notesSaveTimer);
savedEl.classList.remove(‘show’);
notesSaveTimer = setTimeout(function() {
AppState.actionNotes[actionKey] = ta.value;
Store.saveNotes(AppState.actionNotes);
savedEl.classList.add(‘show’);
setTimeout(function() { savedEl.classList.remove(‘show’); }, 2000);
renderStats();
}, 500);
});
}
}

/* ===== DROPDOWN MENU ===== */
function closeDropdown() {
document.getElementById(‘dropdownMenu’).classList.remove(‘open’);
}

/* ===== EXPORT ===== */
function doExport() {
closeDropdown();
var merged = [];
for (var i = 0; i < AppState.pokemon.length; i++) {
var mon = AppState.pokemon[i];
var obj = {
name: mon.name,
id: mon.id,
moves: getMoves(mon.name),
habitat: getHabitat(mon),
personality: getPersonality(mon)
};
merged.push(obj);
}
var exportData = {
pokemon: merged,
actionNotes: AppState.actionNotes,
exportedAt: new Date().toISOString()
};
var blob = new Blob([JSON.stringify(exportData, null, 2)], { type: ‘application/json’ });
var url = URL.createObjectURL(blob);
var a = document.createElement(‘a’);
a.href = url;
a.download = ‘moveforge_export_’ + new Date().toISOString().slice(0, 10) + ‘.json’;
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
URL.revokeObjectURL(url);
}

/* ===== RESET ===== */
function doReset() {
closeDropdown();
if (!confirm(‘Reset ALL MoveForge data? This cannot be undone.’)) return;
Store.clearAll();
AppState.pokemon = [];
AppState.moveEdits = {};
AppState.actionNotes = {};
AppState.metaEdits = {};
AppState.filters = { search: ‘’, habitat: null, personality: null };
document.getElementById(‘searchInput’).value = ‘’;
renderAll();
}

/* ===== EVENT WIRING ===== */
function init() {
document.getElementById(‘versionLabel’).textContent = VERSION;
loadState();
renderAll();

// Menu button — use addEventListener, NOT inline onclick
var menuBtn = document.getElementById(‘menuBtn’);
var dropdown = document.getElementById(‘dropdownMenu’);

function toggleMenu(e) {
e.preventDefault();
e.stopPropagation();
dropdown.classList.toggle(‘open’);
}
menuBtn.addEventListener(‘click’, toggleMenu);
menuBtn.addEventListener(‘touchend’, toggleMenu);

// Close dropdown on outside click/touch
function closeOnOutside(e) {
if (!dropdown.classList.contains(‘open’)) return;
if (menuBtn.contains(e.target) || dropdown.contains(e.target)) return;
closeDropdown();
}
document.addEventListener(‘click’, closeOnOutside);
document.addEventListener(‘touchstart’, closeOnOutside);

// Menu items
document.getElementById(‘menuImport’).addEventListener(‘click’, openImportModal);
document.getElementById(‘menuExport’).addEventListener(‘click’, doExport);
document.getElementById(‘menuReset’).addEventListener(‘click’, doReset);

// Import modal
document.getElementById(‘importCloseBtn’).addEventListener(‘click’, closeImportModal);
document.getElementById(‘importOverlay’).addEventListener(‘click’, closeImportModal);
document.getElementById(‘importCancelBtn’).addEventListener(‘click’, closeImportModal);
document.getElementById(‘importConfirmBtn’).addEventListener(‘click’, doImport);
document.getElementById(‘fabImport’).addEventListener(‘click’, openImportModal);

// Detail modal
document.getElementById(‘detailCloseBtn’).addEventListener(‘click’, closeDetailModal);
document.getElementById(‘detailOverlay’).addEventListener(‘click’, closeDetailModal);

// Notes modal
document.getElementById(‘notesCloseBtn’).addEventListener(‘click’, closeNotesModal);
document.getElementById(‘notesOverlay’).addEventListener(‘click’, closeNotesModal);

// Mon list card clicks (delegated)
document.getElementById(‘monList’).addEventListener(‘click’, function(e) {
// Check for badge clicks first
var badge = e.target.closest(’.badge.habitat’);
if (badge) {
e.stopPropagation();
var hab = badge.getAttribute(‘data-habitat’);
if (hab) {
AppState.filters.habitat = (AppState.filters.habitat === hab) ? null : hab;
renderAll();
}
return;
}
var pbadge = e.target.closest(’.badge.personality’);
if (pbadge) {
e.stopPropagation();
var pers = pbadge.getAttribute(‘data-personality’);
if (pers) {
AppState.filters.personality = (AppState.filters.personality === pers) ? null : pers;
renderAll();
}
return;
}
var card = e.target.closest(’.mon-card’);
if (card) {
var name = card.getAttribute(‘data-name’);
if (name) openDetailModal(name);
}
});

// Filter chip clear
document.getElementById(‘filterChips’).addEventListener(‘click’, function(e) {
var chip = e.target.closest(’.chip-x’);
if (!chip) return;
var clearType = chip.getAttribute(‘data-clear’);
if (clearType === ‘habitat’) AppState.filters.habitat = null;
if (clearType === ‘personality’) AppState.filters.personality = null;
renderAll();
});

// Search input
var searchInput = document.getElementById(‘searchInput’);
var searchTimer = null;
searchInput.addEventListener(‘input’, function() {
if (searchTimer) clearTimeout(searchTimer);
searchTimer = setTimeout(function() {
AppState.filters.search = searchInput.value.trim();
renderList();
}, 200);
});

// Escape key
document.addEventListener(‘keydown’, function(e) {
if (e.key === ‘Escape’) {
if (document.getElementById(‘notesSheet’).classList.contains(‘open’)) {
closeNotesModal();
} else if (document.getElementById(‘detailSheet’).classList.contains(‘open’)) {
closeDetailModal();
} else if (document.getElementById(‘importSheet’).classList.contains(‘open’)) {
closeImportModal();
} else if (dropdown.classList.contains(‘open’)) {
closeDropdown();
}
}
});
}

// Boot
if (document.readyState === ‘loading’) {
document.addEventListener(‘DOMContentLoaded’, init);
} else {
init();
}
</script>

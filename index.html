<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ISLAND MON · Dev Sandbox</title>
<style>
/* =============================================
   ROOT & THEME
   ============================================= */
:root {
  --bg:        #0a0c10;
  --panel:     #10151e;
  --border:    #1e2a3a;
  --accent:    #00e5ff;
  --accent2:   #ff4081;
  --accent3:   #76ff03;
  --text:      #c8d8e8;
  --text-dim:  #5a7080;
  --tab-h:     44px;
  --editor-h:  220px;
  --radius:    6px;
  --font-mono: 'Courier New', Courier, monospace;
  --font-ui:   'Segoe UI', system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg);
color: var(–text);
font-family: var(–font-ui);
min-height: 100vh;
display: flex;
flex-direction: column;
overflow-x: hidden;
}

/* =============================================
SCANLINE OVERLAY (aesthetic)
============================================= */
body::after {
content: ‘’;
position: fixed;
inset: 0;
background: repeating-linear-gradient(
0deg,
transparent,
transparent 2px,
rgba(0,0,0,0.07) 2px,
rgba(0,0,0,0.07) 4px
);
pointer-events: none;
z-index: 9999;
}

/* =============================================
HEADER
============================================= */
header {
display: flex;
align-items: center;
gap: 12px;
padding: 10px 16px;
border-bottom: 1px solid var(–border);
background: var(–panel);
flex-shrink: 0;
}

header .logo {
font-family: var(–font-mono);
font-size: 13px;
letter-spacing: 0.15em;
color: var(–accent);
text-shadow: 0 0 8px var(–accent);
white-space: nowrap;
}

header .version {
font-family: var(–font-mono);
font-size: 10px;
color: var(–text-dim);
}

header .spacer { flex: 1; }

header .header-btn {
background: none;
border: 1px solid var(–border);
color: var(–text-dim);
font-family: var(–font-mono);
font-size: 11px;
padding: 4px 10px;
border-radius: var(–radius);
cursor: pointer;
transition: all .15s;
}
header .header-btn:hover {
border-color: var(–accent2);
color: var(–accent2);
}

/* =============================================
MAIN LAYOUT
============================================= */
main {
display: flex;
flex: 1;
overflow: hidden;
min-height: 0;
}

/* =============================================
LEFT PANEL — EDITOR
============================================= */
#editor-panel {
width: 400px;
min-width: 300px;
display: flex;
flex-direction: column;
border-right: 1px solid var(–border);
background: var(–panel);
flex-shrink: 0;
}

/* Tab bar */
#tab-bar {
display: flex;
overflow-x: auto;
border-bottom: 1px solid var(–border);
scrollbar-width: thin;
scrollbar-color: var(–border) transparent;
flex-shrink: 0;
}

#tab-bar::-webkit-scrollbar { height: 3px; }
#tab-bar::-webkit-scrollbar-thumb { background: var(–border); }

.tab-btn {
flex-shrink: 0;
height: var(–tab-h);
padding: 0 14px;
background: none;
border: none;
border-right: 1px solid var(–border);
color: var(–text-dim);
font-family: var(–font-mono);
font-size: 11px;
letter-spacing: 0.08em;
cursor: pointer;
transition: all .15s;
white-space: nowrap;
position: relative;
}
.tab-btn:hover { color: var(–text); background: rgba(255,255,255,0.03); }
.tab-btn.active {
color: var(–accent);
background: rgba(0,229,255,0.05);
}
.tab-btn.active::after {
content: ‘’;
position: absolute;
bottom: 0; left: 0; right: 0;
height: 2px;
background: var(–accent);
box-shadow: 0 0 6px var(–accent);
}
.tab-btn .tab-dot {
display: inline-block;
width: 5px; height: 5px;
border-radius: 50%;
margin-right: 6px;
background: currentColor;
opacity: 0.5;
}
.tab-btn.has-code .tab-dot { opacity: 1; }

#add-tab-btn {
flex-shrink: 0;
height: var(–tab-h);
width: var(–tab-h);
background: none;
border: none;
border-right: 1px solid var(–border);
color: var(–text-dim);
font-size: 18px;
cursor: pointer;
transition: color .15s;
}
#add-tab-btn:hover { color: var(–accent3); }

/* Editor meta bar */
#editor-meta {
display: flex;
align-items: center;
gap: 8px;
padding: 6px 10px;
border-bottom: 1px solid var(–border);
font-family: var(–font-mono);
font-size: 10px;
color: var(–text-dim);
flex-shrink: 0;
}

#editor-meta .mode-toggle {
display: flex;
gap: 0;
margin-left: auto;
}
.mode-btn {
background: none;
border: 1px solid var(–border);
color: var(–text-dim);
font-family: var(–font-mono);
font-size: 10px;
padding: 2px 8px;
cursor: pointer;
transition: all .15s;
}
.mode-btn:first-child { border-radius: var(–radius) 0 0 var(–radius); }
.mode-btn:last-child  { border-radius: 0 var(–radius) var(–radius) 0; margin-left: -1px; }
.mode-btn.active { background: var(–accent); color: #000; border-color: var(–accent); }

/* Code textarea */
#code-editor {
flex: 1;
background: #080b10;
color: #a8c8d8;
font-family: var(–font-mono);
font-size: 12px;
line-height: 1.6;
padding: 12px;
border: none;
resize: none;
outline: none;
tab-size: 2;
min-height: var(–editor-h);
}
#code-editor::placeholder { color: #2a3a4a; }
#code-editor:focus { background: #090d14; }

/* Action bar */
#action-bar {
display: flex;
gap: 8px;
padding: 8px 10px;
border-top: 1px solid var(–border);
flex-shrink: 0;
}

.action-btn {
flex: 1;
height: 36px;
border: none;
border-radius: var(–radius);
font-family: var(–font-mono);
font-size: 11px;
font-weight: 700;
letter-spacing: 0.1em;
cursor: pointer;
transition: all .15s;
}
#run-btn {
background: var(–accent);
color: #000;
box-shadow: 0 0 12px rgba(0,229,255,0.3);
}
#run-btn:hover { box-shadow: 0 0 20px rgba(0,229,255,0.5); transform: translateY(-1px); }
#run-btn:active { transform: translateY(0); }

#clear-btn {
background: none;
border: 1px solid var(–border);
color: var(–text-dim);
flex: 0 0 auto;
width: 36px;
font-size: 14px;
}
#clear-btn:hover { border-color: var(–accent2); color: var(–accent2); }

/* =============================================
JSON DATA PANEL (below editor)
============================================= */
#data-panel {
border-top: 1px solid var(–border);
flex-shrink: 0;
}

#data-panel-header {
display: flex;
align-items: center;
gap: 8px;
padding: 6px 10px;
background: rgba(0,0,0,0.2);
cursor: pointer;
font-family: var(–font-mono);
font-size: 10px;
letter-spacing: 0.08em;
color: var(–text-dim);
user-select: none;
}
#data-panel-header:hover { color: var(–accent3); }
#data-panel-header .dp-arrow { transition: transform .2s; }
#data-panel-header.open .dp-arrow { transform: rotate(90deg); }
#data-panel-header .dp-keys {
margin-left: auto;
color: var(–accent3);
font-size: 9px;
}

#data-panel-body {
display: none;
padding: 8px 10px;
gap: 6px;
flex-direction: column;
}
#data-panel-body.open { display: flex; }

#json-input {
background: #080b10;
color: #a8d8a8;
font-family: var(–font-mono);
font-size: 11px;
padding: 8px;
border: 1px solid var(–border);
border-radius: var(–radius);
resize: vertical;
outline: none;
min-height: 80px;
max-height: 160px;
}
#json-input:focus { border-color: var(–accent3); }

#json-load-btn {
background: var(–accent3);
color: #000;
border: none;
border-radius: var(–radius);
height: 30px;
font-family: var(–font-mono);
font-size: 10px;
font-weight: 700;
letter-spacing: 0.1em;
cursor: pointer;
}
#json-load-btn:hover { opacity: 0.85; }

#json-status {
font-family: var(–font-mono);
font-size: 10px;
color: var(–text-dim);
min-height: 14px;
}

/* =============================================
RIGHT PANEL — CANVAS + LOG
============================================= */
#right-panel {
flex: 1;
display: flex;
flex-direction: column;
min-width: 0;
overflow: hidden;
}

#canvas-wrapper {
flex: 1;
display: flex;
align-items: center;
justify-content: center;
background: #05080d;
position: relative;
overflow: hidden;
min-height: 300px;
}

#canvas-wrapper .canvas-label {
position: absolute;
top: 8px; left: 12px;
font-family: var(–font-mono);
font-size: 10px;
color: var(–text-dim);
letter-spacing: 0.08em;
pointer-events: none;
z-index: 10;
}

#canvas-wrapper .idle-msg {
font-family: var(–font-mono);
font-size: 12px;
color: var(–text-dim);
text-align: center;
padding: 20px;
line-height: 2;
}
#canvas-wrapper .idle-msg span { color: var(–accent); }

#phaser-container canvas {
display: block;
max-width: 100%;
}

/* Log panel */
#log-panel {
height: 120px;
border-top: 1px solid var(–border);
display: flex;
flex-direction: column;
flex-shrink: 0;
}

#log-header {
display: flex;
align-items: center;
gap: 8px;
padding: 4px 10px;
background: rgba(0,0,0,0.2);
border-bottom: 1px solid var(–border);
font-family: var(–font-mono);
font-size: 10px;
color: var(–text-dim);
flex-shrink: 0;
}

#log-header .log-indicator {
width: 6px; height: 6px;
border-radius: 50%;
background: var(–text-dim);
transition: background .3s;
}
#log-header .log-indicator.active { background: var(–accent3); box-shadow: 0 0 4px var(–accent3); }

#clear-log-btn {
margin-left: auto;
background: none;
border: none;
color: var(–text-dim);
font-family: var(–font-mono);
font-size: 10px;
cursor: pointer;
}
#clear-log-btn:hover { color: var(–accent2); }

#log-output {
flex: 1;
overflow-y: auto;
padding: 6px 10px;
font-family: var(–font-mono);
font-size: 11px;
line-height: 1.6;
scrollbar-width: thin;
scrollbar-color: var(–border) transparent;
}
#log-output::-webkit-scrollbar { width: 4px; }
#log-output::-webkit-scrollbar-thumb { background: var(–border); }

.log-line { color: var(–text-dim); }
.log-line.info  { color: var(–accent); }
.log-line.ok    { color: var(–accent3); }
.log-line.warn  { color: #ffb300; }
.log-line.error { color: var(–accent2); }
.log-line .log-ts { color: #2a4050; margin-right: 6px; }

/* =============================================
STORAGE DRAWER (bottom)
============================================= */
#storage-drawer {
border-top: 1px solid var(–border);
background: var(–panel);
flex-shrink: 0;
}

#storage-header {
display: flex;
align-items: center;
gap: 8px;
padding: 6px 12px;
cursor: pointer;
font-family: var(–font-mono);
font-size: 10px;
color: var(–text-dim);
letter-spacing: 0.08em;
user-select: none;
}
#storage-header:hover { color: var(–text); }
#storage-header .sh-arrow { transition: transform .2s; }
#storage-header.open .sh-arrow { transform: rotate(90deg); }

#storage-body {
display: none;
padding: 8px 12px;
gap: 6px;
flex-wrap: wrap;
}
#storage-body.open { display: flex; }

.storage-chip {
display: flex;
align-items: center;
gap: 6px;
background: rgba(255,255,255,0.04);
border: 1px solid var(–border);
border-radius: var(–radius);
padding: 4px 8px;
font-family: var(–font-mono);
font-size: 10px;
color: var(–text-dim);
}
.storage-chip .chip-key { color: var(–accent3); }
.storage-chip .chip-del {
background: none;
border: none;
color: var(–text-dim);
cursor: pointer;
font-size: 12px;
line-height: 1;
padding: 0 2px;
}
.storage-chip .chip-del:hover { color: var(–accent2); }

/* =============================================
MODAL — ADD TAB
============================================= */
#modal-overlay {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.7);
display: none;
align-items: center;
justify-content: center;
z-index: 1000;
}
#modal-overlay.open { display: flex; }

#modal-box {
background: var(–panel);
border: 1px solid var(–border);
border-radius: var(–radius);
padding: 20px;
min-width: 280px;
box-shadow: 0 0 40px rgba(0,0,0,0.6);
}
#modal-box h3 {
font-family: var(–font-mono);
font-size: 12px;
letter-spacing: 0.1em;
color: var(–accent);
margin-bottom: 12px;
}
#new-tab-name {
width: 100%;
background: #080b10;
border: 1px solid var(–border);
border-radius: var(–radius);
color: var(–text);
font-family: var(–font-mono);
font-size: 13px;
padding: 8px 10px;
outline: none;
margin-bottom: 10px;
}
#new-tab-name:focus { border-color: var(–accent); }
.modal-btns { display: flex; gap: 8px; }
.modal-btns button {
flex: 1;
height: 34px;
border: none;
border-radius: var(–radius);
font-family: var(–font-mono);
font-size: 11px;
font-weight: 700;
cursor: pointer;
}
#modal-ok  { background: var(–accent); color: #000; }
#modal-cancel { background: none; border: 1px solid var(–border); color: var(–text-dim); }

/* =============================================
RESPONSIVE
============================================= */
@media (max-width: 900px) {
main { flex-direction: column; }
#editor-panel { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid var(–border); }
#code-editor { min-height: 140px; }
#right-panel { min-height: 300px; }
}

@media (max-width: 600px) {
header .logo { font-size: 11px; }
.tab-btn { padding: 0 10px; font-size: 10px; }
#log-panel { height: 90px; }
}

@media (max-width: 380px) {
#editor-panel { min-width: 0; }
#action-bar { gap: 4px; }
}
</style>

</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>

<script>
/* =================================================
   SANDBOX CORE
   ================================================= */

// ── Default tabs ──────────────────────────────────
const DEFAULT_TABS = [
  { id: 'pokemon',  label: 'POKEMON',  color: '#ff4081' },
  { id: 'moves',    label: 'MOVES',    color: '#76ff03' },
  { id: 'weather',  label: 'WEATHER',  color: '#00e5ff' },
  { id: 'player',   label: 'PLAYER',   color: '#ffd740' },
  { id: 'loot',     label: 'LOOT',     color: '#e040fb' },
  { id: 'biomes',   label: 'BIOMES',   color: '#ff6e40' },
];

const LS_PREFIX_CODE = 'sandbox_code_';
const LS_PREFIX_DATA = 'sandbox_data_';
const LS_TABS        = 'sandbox_tabs';

// ── State ─────────────────────────────────────────
let tabs        = [];
let activeTabId = null;
let editorMode  = 'js'; // 'js' | 'json'
let phaserGame  = null;
let activeScene = null;

/* =================================================
   SHARED GAME STATE (accessible from snippets)
   ================================================= */
window.gameState = {
  player:  { x: 400, y: 300, hp: 100, name: 'Trainer' },
  world:   { time: 0, weather: 'clear', biome: 'beach' },
  pokemon: [],
  loot:    [],
};

/* =================================================
   SANDBOX API (exposed to user snippets)
   ================================================= */
window.SandboxAPI = {
  /** Store JSON data under a key */
  setData(key, value) {
    localStorage.setItem(LS_PREFIX_DATA + key, JSON.stringify(value));
    log(`DATA SET: ${key}`, 'ok');
    refreshDataKeys();
    refreshStorageDrawer();
  },
  /** Read stored JSON data by key */
  getData(key) {
    const raw = localStorage.getItem(LS_PREFIX_DATA + key);
    if (raw === null) return null;
    try { return JSON.parse(raw); } catch { return null; }
  },
  /** Log to the console panel */
  log(msg, level = 'info') { log(String(msg), level); },
  /** Get the active Phaser scene (or null) */
  getScene() { return activeScene; },
  /** Shared mutable game state object */
  get gameState() { return window.gameState; },
};

/* =================================================
   LOGGING
   ================================================= */
const logEl        = document.getElementById('log-output');
const logIndicator = document.getElementById('log-indicator');
let logFlash;

function log(msg, level = 'info') {
  const ts   = new Date().toLocaleTimeString('en-US', { hour12: false });
  const line = document.createElement('div');
  line.className = `log-line ${level}`;
  line.innerHTML = `<span class="log-ts">${ts}</span>${escapeHtml(msg)}`;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;

  // Flash indicator
  logIndicator.classList.add('active');
  clearTimeout(logFlash);
  logFlash = setTimeout(() => logIndicator.classList.remove('active'), 600);
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

document.getElementById('clear-log-btn').addEventListener('click', () => {
  logEl.innerHTML = '';
});

/* =================================================
   TAB MANAGEMENT
   ================================================= */
function loadTabs() {
  const saved = localStorage.getItem(LS_TABS);
  if (saved) {
    try { tabs = JSON.parse(saved); return; } catch { /**/ }
  }
  tabs = DEFAULT_TABS.map(t => ({ ...t }));
  saveTabs();
}

function saveTabs() {
  localStorage.setItem(LS_TABS, JSON.stringify(tabs));
}

function renderTabBar() {
  const bar = document.getElementById('tab-bar');
  // Remove all tab buttons (keep add btn)
  bar.querySelectorAll('.tab-btn').forEach(b => b.remove());
  const addBtn = document.getElementById('add-tab-btn');

  tabs.forEach(tab => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (tab.id === activeTabId ? ' active' : '');
    const hasCode = !!localStorage.getItem(LS_PREFIX_CODE + tab.id);
    if (hasCode) btn.classList.add('has-code');
    btn.dataset.id = tab.id;

    const dot = document.createElement('span');
    dot.className = 'tab-dot';
    dot.style.background = tab.color || 'currentColor';
    btn.appendChild(dot);
    btn.appendChild(document.createTextNode(tab.label));

    btn.addEventListener('click', () => activateTab(tab.id));
    bar.insertBefore(btn, addBtn);
  });
}

function activateTab(id) {
  // Save current editor content before switching
  if (activeTabId) saveCurrentEditor();

  activeTabId = id;
  const tab = tabs.find(t => t.id === id);

  // Load code for this tab
  const code = localStorage.getItem(LS_PREFIX_CODE + id) || '';
  document.getElementById('code-editor').value = code;
  document.getElementById('active-tab-label').textContent = tab ? tab.label : id;
  updateCharCount();
  renderTabBar();
}

function saveCurrentEditor() {
  if (!activeTabId) return;
  const code = document.getElementById('code-editor').value;
  localStorage.setItem(LS_PREFIX_CODE + activeTabId, code);
  renderTabBar(); // update dot state
}

/* =================================================
   ADD TAB MODAL
   ================================================= */
document.getElementById('add-tab-btn').addEventListener('click', () => {
  document.getElementById('new-tab-name').value = '';
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('new-tab-name').focus();
});

document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

document.getElementById('modal-ok').addEventListener('click', createTab);
document.getElementById('new-tab-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') createTab();
  if (e.key === 'Escape') closeModal();
});

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function createTab() {
  const name = document.getElementById('new-tab-name').value.trim();
  if (!name) return;
  const id = name.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
  if (!id || tabs.find(t => t.id === id)) {
    log(`Tab "${id}" already exists or invalid name`, 'warn');
    closeModal();
    return;
  }
  const COLORS = ['#ff4081','#76ff03','#00e5ff','#ffd740','#e040fb','#ff6e40','#40c4ff','#b2ff59'];
  const color  = COLORS[tabs.length % COLORS.length];
  tabs.push({ id, label: name.toUpperCase(), color });
  saveTabs();
  closeModal();
  activateTab(id);
  log(`New tab created: ${name}`, 'ok');
}

/* =================================================
   EDITOR MODE TOGGLE
   ================================================= */
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    editorMode = btn.dataset.mode;
    const editor = document.getElementById('code-editor');
    if (editorMode === 'json') {
      editor.placeholder = '{\n  "pokemon": [{"name":"Bulbasaur","hp":45}]\n}';
    } else {
      editor.placeholder = '// JavaScript — use SandboxAPI, gameState, scene\n// SandboxAPI.log("hello world")';
    }
  });
});

/* ── char counter ── */
document.getElementById('code-editor').addEventListener('input', updateCharCount);
function updateCharCount() {
  const n = document.getElementById('code-editor').value.length;
  document.getElementById('char-count').textContent = n + ' chars';
}

/* ── clear editor ── */
document.getElementById('clear-btn').addEventListener('click', () => {
  document.getElementById('code-editor').value = '';
  updateCharCount();
});

/* =================================================
   RUN BUTTON
   ================================================= */
document.getElementById('run-btn').addEventListener('click', runCode);

function runCode() {
  saveCurrentEditor();
  const code = document.getElementById('code-editor').value.trim();
  if (!code) { log('Editor is empty', 'warn'); return; }

  if (editorMode === 'json') {
    // JSON mode: store under active tab key
    try {
      const parsed = JSON.parse(code);
      SandboxAPI.setData(activeTabId, parsed);
      log(`JSON stored under key: ${activeTabId}`, 'ok');
    } catch (err) {
      log('JSON parse error: ' + err.message, 'error');
    }
    return;
  }

  // JS mode: execute snippet
  log(`Running [${activeTabId}]…`, 'info');
  try {
    // Inject helpful locals into snippet scope
    const scene = activeScene;
    // eslint-disable-next-line no-new-func
    const fn = new Function(
      'scene', 'gameState', 'SandboxAPI', 'Phaser',
      code
    );
    fn(scene, window.gameState, window.SandboxAPI, window.Phaser);
    log(`[${activeTabId}] executed OK`, 'ok');
  } catch (err) {
    log('Runtime error: ' + err.message, 'error');
    console.error(err);
  }

  // Show canvas if hidden
  document.getElementById('idle-msg').style.display = 'none';
  document.getElementById('scene-label').textContent = `SCENE · ${activeTabId}`;
}

/* =================================================
   JSON DATA PANEL
   ================================================= */
const dpHeader = document.getElementById('data-panel-header');
const dpBody   = document.getElementById('data-panel-body');

dpHeader.addEventListener('click', () => {
  dpHeader.classList.toggle('open');
  dpBody.classList.toggle('open');
});

document.getElementById('json-load-btn').addEventListener('click', () => {
  const raw = document.getElementById('json-input').value.trim();
  const statusEl = document.getElementById('json-status');
  if (!raw) { statusEl.textContent = 'Paste JSON first.'; return; }
  try {
    const parsed = JSON.parse(raw);
    // Store each top-level key separately
    let count = 0;
    if (typeof parsed === 'object' && !Array.isArray(parsed)) {
      Object.entries(parsed).forEach(([k, v]) => {
        SandboxAPI.setData(k, v);
        count++;
      });
      statusEl.textContent = `✓ Loaded ${count} key(s)`;
    } else {
      // Store whole thing under 'data'
      SandboxAPI.setData('data', parsed);
      statusEl.textContent = '✓ Loaded as "data"';
    }
    refreshDataKeys();
  } catch (err) {
    statusEl.textContent = '✗ ' + err.message;
  }
});

function refreshDataKeys() {
  const keys = Object.keys(localStorage)
    .filter(k => k.startsWith(LS_PREFIX_DATA))
    .map(k => k.replace(LS_PREFIX_DATA, ''));
  document.getElementById('dp-key-list').textContent =
    keys.length ? keys.join(', ') : 'empty';
}

/* =================================================
   STORAGE DRAWER
   ================================================= */
const storageHeader = document.getElementById('storage-header');
const storageBody   = document.getElementById('storage-body');

storageHeader.addEventListener('click', () => {
  storageHeader.classList.toggle('open');
  storageBody.classList.toggle('open');
  if (storageBody.classList.contains('open')) refreshStorageDrawer();
});

function refreshStorageDrawer() {
  storageBody.innerHTML = '';
  const keys = Object.keys(localStorage).filter(k => k.startsWith('sandbox_'));
  if (!keys.length) {
    storageBody.innerHTML = '<span style="font-family:var(--font-mono);font-size:10px;color:var(--text-dim)">No sandbox keys stored.</span>';
    return;
  }
  keys.sort().forEach(key => {
    const chip  = document.createElement('div');
    chip.className = 'storage-chip';
    const raw   = localStorage.getItem(key);
    const bytes = new Blob([raw]).size;
    const label = key.replace('sandbox_code_', '📄 ').replace('sandbox_data_', '🗄 ').replace('sandbox_tabs', '🗂 tabs');
    chip.innerHTML = `<span class="chip-key">${escapeHtml(label)}</span><span>${bytes}B</span>`;
    const del = document.createElement('button');
    del.className = 'chip-del';
    del.textContent = '✕';
    del.title = 'Delete ' + key;
    del.addEventListener('click', () => {
      localStorage.removeItem(key);
      log(`Deleted: ${key}`, 'warn');
      refreshStorageDrawer();
      refreshDataKeys();
    });
    chip.appendChild(del);
    storageBody.appendChild(chip);
  });
}

/* =================================================
   EXPORT / IMPORT
   ================================================= */
document.getElementById('export-btn').addEventListener('click', () => {
  const payload = {};
  Object.keys(localStorage).filter(k => k.startsWith('sandbox_')).forEach(k => {
    payload[k] = localStorage.getItem(k);
  });
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = 'sandbox-export.json';
  a.click();
  URL.revokeObjectURL(url);
  log('Exported sandbox data', 'ok');
});

document.getElementById('import-btn').addEventListener('click', () => {
  document.getElementById('import-file-input').click();
});
document.getElementById('import-file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const payload = JSON.parse(ev.target.result);
      let count = 0;
      Object.entries(payload).forEach(([k, v]) => {
        if (k.startsWith('sandbox_')) { localStorage.setItem(k, v); count++; }
      });
      log(`Imported ${count} sandbox keys`, 'ok');
      loadTabs(); renderTabBar();
      refreshDataKeys(); refreshStorageDrawer();
    } catch (err) {
      log('Import failed: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

/* =================================================
   PHASER 3 GAME
   ================================================= */
function initPhaser() {
  if (phaserGame) { phaserGame.destroy(true); phaserGame = null; activeScene = null; }

  class SandboxScene extends Phaser.Scene {
    constructor() { super({ key: 'SandboxScene' }); }

    preload() {
      // nothing by default; snippets can call this.load.image() etc.
    }

    create() {
      activeScene = this;

      // Draw a grid background
      const gfx = this.add.graphics();
      gfx.lineStyle(1, 0x1e2a3a, 1);
      const W = this.cameras.main.width;
      const H = this.cameras.main.height;
      for (let x = 0; x <= W; x += 32) gfx.lineBetween(x, 0, x, H);
      for (let y = 0; y <= H; y += 32) gfx.lineBetween(0, y, W, y);

      // Axis marker
      gfx.lineStyle(1, 0x00e5ff, 0.3);
      gfx.lineBetween(W/2, 0, W/2, H);
      gfx.lineBetween(0, H/2, W, H/2);

      // Coords text
      this.coordText = this.add.text(4, 4, '(0,0)', {
        fontFamily: 'Courier New',
        fontSize: '10px',
        color: '#2a4050'
      }).setDepth(100);

      // Mouse tracking
      this.input.on('pointermove', p => {
        const wx = Math.round(p.worldX);
        const wy = Math.round(p.worldY);
        this.coordText.setText(`(${wx},${wy})`);
      });

      log('Phaser scene ready', 'ok');
    }

    update(time) {
      window.gameState.world.time = Math.round(time);
    }
  }

  const container = document.getElementById('phaser-container');
  const wrapper   = document.getElementById('canvas-wrapper');
  const w = Math.min(wrapper.clientWidth  || 640, 640);
  const h = Math.min(wrapper.clientHeight || 400, 400);

  phaserGame = new Phaser.Game({
    type: Phaser.AUTO,
    width:  w,
    height: h,
    backgroundColor: '#05080d',
    parent: 'phaser-container',
    scene: [SandboxScene],
    physics: { default: 'arcade', arcade: { debug: false } },
    audio: { noAudio: true },
  });
}

/* =================================================
   INIT
   ================================================= */
function init() {
  loadTabs();
  if (tabs.length > 0) activateTab(tabs[0].id);
  refreshDataKeys();
  initPhaser();
  log('Sandbox ready · Phaser ' + Phaser.VERSION, 'info');
}

window.addEventListener('load', init);
